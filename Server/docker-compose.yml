services:
  mongo:
    image: mongo:4.4.30
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data

  screeps:
    image: ghcr.io/jomik/screeps-server:edge
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    ports:
      - "21025:21025"
    volumes:
      - ./screeps/config.yml:/screeps/config.yml
      - screeps-user:/home/node
      - screeps-data:/data
      - screeps-mods:/screeps/mods
    environment:
      MONGO_HOST: mongo
      REDIS_HOST: redis
      STEAM_KEY: ${STEAM_KEY:?"Missing STEAM_KEY. Create Server/.env from Server/.env.example or export STEAM_KEY before starting Docker Compose."}

  steamless-client:
    image: node:22
    restart: unless-stopped
    profiles:
      - browser
    depends_on:
      - screeps
    command: >
      sh -lc 'test -f /steamless/package.nw ||
      { echo "Missing /steamless/package.nw. Copy your real Screeps package.nw to Server/steamless-client/package.nw or set SCREEPS_NW_DIR to a directory that contains package.nw." >&2; exit 1; };
      exec npx screepers-steamless-client
      --package /steamless/package.nw
      --host 0.0.0.0
      --public_hostname ${SCREEPS_PROXY_PUBLIC_HOSTNAME:-localhost}
      --public_port ${SCREEPS_PROXY_PORT:-8080}
      --internal_backend http://screeps:21025'
    ports:
      - "${SCREEPS_PROXY_HOST:-127.0.0.1}:${SCREEPS_PROXY_PORT:-8080}:8080/tcp"
    volumes:
      - ${SCREEPS_NW_DIR:-./steamless-client}:/steamless:ro
      - steamless-npm-cache:/root/.npm

volumes:
  mongo-data:
  redis-data:
  screeps-data:
  screeps-mods:
  screeps-user:
  steamless-npm-cache:
